<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarifas — Pepe Metro Films</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808; color: #f0ede8;
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 24px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; letter-spacing: .2em;
      color: rgba(240,237,232,.4); margin-bottom: 48px;
    }

    .cards { display: flex; flex-direction: column; gap: 3px; width: 100%; max-width: 560px; }

    .card {
      background: rgba(240,237,232,.05);
      border: 1px solid rgba(240,237,232,.08);
      padding: 24px 24px 20px;
      transition: border-color .2s;
    }
    .card:hover { border-color: rgba(240,237,232,.2); }

    .card-label {
      font-size: .52rem; letter-spacing: .3em; text-transform: uppercase;
      color: #6b6b6b; margin-bottom: 8px;
    }
    .card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; letter-spacing: .06em; line-height: 1;
      margin-bottom: 16px;
    }

    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn-open {
      display: inline-block; text-decoration: none;
      background: #f0ede8; color: #080808;
      font-family: 'DM Sans', sans-serif; font-weight: 400;
      font-size: .6rem; letter-spacing: .18em; text-transform: uppercase;
      padding: 10px 20px; transition: background .2s; border: none; cursor: pointer;
    }
    .btn-open:hover { background: rgba(240,237,232,.85); }

    .btn-copy {
      background: none; border: 1px solid rgba(240,237,232,.15);
      color: rgba(240,237,232,.5);
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      font-size: .6rem; letter-spacing: .18em; text-transform: uppercase;
      padding: 10px 20px; cursor: pointer; transition: border-color .2s, color .2s;
    }
    .btn-copy:hover { border-color: rgba(240,237,232,.4); color: #f0ede8; }
    .btn-copy.copied { border-color: rgba(126,200,122,.5); color: rgba(126,200,122,.9); }

    .url {
      font-size: .62rem; letter-spacing: .04em; color: rgba(240,237,232,.2);
      margin-top: 12px; word-break: break-all;
    }

    footer {
      margin-top: 48px;
      font-size: .55rem; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(240,237,232,.15);
    }
  </style>
</head>
<body>

<h1>PEPE METRO FILMS · TARIFAS</h1>

<div class="cards">

  <div class="card">
    <div class="card-label">Tarifa 01</div>
    <div class="card-name">BODAS 2026</div>
    <div class="card-actions">
      <a class="btn-open" href="https://pepemetrofilms.com/tarifas/bodas.html" target="_blank">Abrir →</a>
      <button class="btn-copy" onclick="copiar(this, 'https://pepemetrofilms.com/tarifas/bodas.html')">Copiar enlace</button>
    </div>
    <div class="url">pepemetrofilms.com/tarifas/bodas.html</div>
  </div>

  <div class="card">
    <div class="card-label">Tarifa 02</div>
    <div class="card-name">DISCO 2026</div>
    <div class="card-actions">
      <a class="btn-open" href="https://pepemetrofilms.com/tarifas/disco.html" target="_blank">Abrir →</a>
      <button class="btn-copy" onclick="copiar(this, 'https://pepemetrofilms.com/tarifas/disco.html')">Copiar enlace</button>
    </div>
    <div class="url">pepemetrofilms.com/tarifas/disco.html</div>
  </div>

  <div class="card">
    <div class="card-label">Tarifa 03</div>
    <div class="card-name">WEDDING PARTY</div>
    <div class="card-actions">
      <a class="btn-open" href="https://pepemetrofilms.com/tarifas/wedding-party.html" target="_blank">Abrir →</a>
      <button class="btn-copy" onclick="copiar(this, 'https://pepemetrofilms.com/tarifas/wedding-party.html')">Copiar enlace</button>
    </div>
    <div class="url">pepemetrofilms.com/tarifas/wedding-party.html</div>
  </div>

</div>

<footer>Documento privado · Pepe Metro Films</footer>

<script>
  function copiar(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = '✓ Copiado';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copiar enlace'; btn.classList.remove('copied'); }, 2000);
    });
  }
</script>
</body>
</html>
