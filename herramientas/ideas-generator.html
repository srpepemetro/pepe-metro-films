<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideas · Pepe Metro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black:  #080808;
  --white:  #f0ede8;
  --grey:   #6b6b6b;
  --accent: #C8B89A;
  --dim:    rgba(240,237,232,0.06);
  --border: rgba(240,237,232,0.10);
  --pill-border: rgba(240,237,232,0.22);
  --pill-hover:  rgba(240,237,232,0.07);
}

body {
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.app {
  max-width: 660px;
  margin: 0 auto;
  padding: 48px 20px 100px;
}

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 52px;
}

.brand {
  display: block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: 5px;
  color: var(--accent);
  margin-bottom: 10px;
}

header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(40px, 9vw, 64px);
  letter-spacing: 3px;
  line-height: 1;
  color: var(--white);
}

header h1 em {
  font-style: normal;
  color: var(--accent);
}

header p.subtitle {
  margin-top: 14px;
  color: var(--grey);
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.5px;
}

/* ── SELECTORS ── */
.selectors {
  display: flex;
  flex-direction: column;
  gap: 30px;
  margin-bottom: 12px;
}

.selector-group {
  border-bottom: 1px solid var(--border);
  padding-bottom: 24px;
}

.selector-group:last-child {
  border-bottom: none;
}

.group-label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.group-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent);
  background: rgba(200,184,154,0.12);
  padding: 2px 7px;
  border-radius: 2px;
}

.group-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 3px;
  color: rgba(240,237,232,0.7);
}

.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.pill {
  padding: 7px 15px;
  border: 1px solid var(--pill-border);
  background: transparent;
  color: rgba(240,237,232,0.75);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 400;
  border-radius: 100px;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.pill:hover {
  background: var(--pill-hover);
  border-color: rgba(240,237,232,0.45);
  color: var(--white);
}

.pill.active {
  background: var(--white);
  color: var(--black);
  border-color: var(--white);
  font-weight: 500;
}

/* ── CONTEXT FIELD ── */
.context-wrap {
  margin-top: 24px;
  margin-bottom: 36px;
}

.context-label {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--grey);
  text-transform: uppercase;
  display: block;
  margin-bottom: 8px;
}

.context-input {
  width: 100%;
  background: var(--dim);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 12px 16px;
  outline: none;
  border-radius: 2px;
  transition: border-color 0.15s;
}

.context-input::placeholder {
  color: rgba(240,237,232,0.25);
}

.context-input:focus {
  border-color: rgba(240,237,232,0.35);
}

/* ── GENERATE BUTTON ── */
.generate-wrap {
  text-align: center;
  margin-bottom: 0;
}

.btn-generate {
  width: 100%;
  padding: 18px 40px;
  background: var(--white);
  color: var(--black);
  border: none;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 4px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  border-radius: 2px;
}

.btn-generate:hover {
  background: var(--accent);
}

.btn-generate:active {
  transform: scale(0.99);
}

/* ── DIVIDER ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 48px 0;
}

/* ── RESULTS ── */
#resultados { display: none; }

.resultados-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.resultados-header h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 3px;
  color: var(--white);
}

.header-actions {
  display: flex;
  gap: 8px;
}

.btn-regen, .btn-whatsapp {
  background: transparent;
  border: 1px solid var(--pill-border);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  padding: 6px 14px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}

.btn-regen {
  color: var(--white);
}

.btn-regen:hover {
  border-color: var(--white);
  background: rgba(240,237,232,0.05);
}

.btn-whatsapp {
  color: var(--accent);
  border-color: rgba(200,184,154,0.35);
}

.btn-whatsapp:hover {
  background: rgba(200,184,154,0.08);
  border-color: var(--accent);
}

/* ── IDEA CARDS ── */
.ideas-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 32px;
}

.idea-card {
  background: var(--dim);
  border: 1px solid var(--border);
  padding: 24px;
  border-radius: 4px;
  opacity: 0;
  animation: slideIn 0.35s ease forwards;
}

.idea-card:nth-child(1) { animation-delay: 0.04s; }
.idea-card:nth-child(2) { animation-delay: 0.10s; }
.idea-card:nth-child(3) { animation-delay: 0.16s; }
.idea-card:nth-child(4) { animation-delay: 0.22s; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 4px;
}

.idea-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--accent);
}

.idea-titulo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 1px;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 4px;
}

.idea-formato {
  font-size: 12px;
  color: var(--grey);
  margin-bottom: 20px;
  font-weight: 300;
}

.row {
  margin-bottom: 14px;
}

.row-label {
  font-size: 10px;
  letter-spacing: 2.5px;
  color: var(--accent);
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 7px;
}

.grabar-list {
  list-style: none;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.grabar-list li {
  font-size: 13px;
  color: rgba(240,237,232,0.78);
  padding-left: 18px;
  position: relative;
  line-height: 1.5;
}

.grabar-list li::before {
  content: '—';
  position: absolute;
  left: 0;
  color: var(--grey);
}

.idea-hook {
  font-size: 13px;
  color: rgba(240,237,232,0.88);
  font-style: italic;
  border-left: 2px solid var(--accent);
  padding-left: 12px;
  line-height: 1.55;
}

.idea-porque {
  font-size: 13px;
  color: rgba(240,237,232,0.62);
  line-height: 1.55;
}

.card-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.btn-copy {
  background: transparent;
  border: 1px solid var(--pill-border);
  color: var(--grey);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 1px;
  padding: 5px 14px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}

.btn-copy:hover {
  color: var(--white);
  border-color: rgba(240,237,232,0.5);
}

.btn-copy.copied {
  color: var(--accent);
  border-color: rgba(200,184,154,0.5);
}

/* ── WHATSAPP PANEL ── */
.wa-panel {
  display: none;
  margin-top: 0;
  background: rgba(200,184,154,0.06);
  border: 1px solid rgba(200,184,154,0.2);
  border-radius: 4px;
  padding: 20px;
}

.wa-panel.visible { display: block; }

.wa-panel label {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
  display: block;
  margin-bottom: 10px;
}

.wa-text {
  width: 100%;
  background: rgba(240,237,232,0.03);
  border: 1px solid var(--border);
  color: rgba(240,237,232,0.75);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  line-height: 1.6;
  padding: 14px;
  min-height: 180px;
  outline: none;
  resize: vertical;
  border-radius: 2px;
}

.wa-actions {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.btn-copy-wa {
  padding: 9px 20px;
  background: var(--accent);
  color: var(--black);
  border: none;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  cursor: pointer;
  border-radius: 2px;
  transition: opacity 0.15s;
}

.btn-copy-wa:hover { opacity: 0.85; }

.btn-close-wa {
  padding: 9px 20px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--grey);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}

.btn-close-wa:hover {
  color: var(--white);
  border-color: rgba(240,237,232,0.4);
}

/* ── RESPONSIVE ── */
@media (max-width: 420px) {
  .app { padding: 32px 16px 80px; }
  header h1 { font-size: 36px; }
  .idea-titulo { font-size: 20px; }
  .resultados-header h2 { font-size: 18px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <span class="brand">PEPE METRO · GENERADOR DE IDEAS</span>
    <h1>BRAINSTORM<br><em>CLIENTE</em></h1>
    <p class="subtitle">Selecciona el contexto y recibe ideas concretas para proponer</p>
  </header>

  <!-- SELECTORS -->
  <section class="selectors">

    <div class="selector-group">
      <div class="group-label">
        <span class="group-num">01</span>
        <span class="group-title">TIPO DE CLIENTE</span>
      </div>
      <div class="pills" data-group="cliente">
        <button class="pill" data-value="sastreria">Sastrería / Moda</button>
        <button class="pill" data-value="discoteca">Discoteca / Sala</button>
        <button class="pill" data-value="dj">DJ / Artista</button>
        <button class="pill" data-value="restaurante">Restaurante</button>
        <button class="pill" data-value="boda">Boda / Pareja</button>
        <button class="pill" data-value="fitness">Fitness / Coach</button>
        <button class="pill" data-value="marca_personal">Marca Personal</button>
      </div>
    </div>

    <div class="selector-group">
      <div class="group-label">
        <span class="group-num">02</span>
        <span class="group-title">QUÉ TIENES PARA GRABAR</span>
      </div>
      <div class="pills" data-group="trabajo">
        <button class="pill" data-value="clip_movil">Clip de móvil</button>
        <button class="pill" data-value="camara_360">Cámara 360</button>
        <button class="pill" data-value="fotos">Solo fotos</button>
        <button class="pill" data-value="fotos_video">Fotos + vídeo mix</button>
        <button class="pill" data-value="video_profesional">Vídeo profesional</button>
      </div>
    </div>

    <div class="selector-group">
      <div class="group-label">
        <span class="group-num">03</span>
        <span class="group-title">PLATAFORMA</span>
      </div>
      <div class="pills" data-group="plataforma">
        <button class="pill" data-value="tiktok">TikTok</button>
        <button class="pill" data-value="reels">Instagram Reels</button>
        <button class="pill" data-value="stories">Instagram Stories</button>
        <button class="pill" data-value="youtube">YouTube Shorts</button>
        <button class="pill" data-value="linkedin">LinkedIn</button>
        <button class="pill" data-value="multi">Multi-plataforma</button>
      </div>
    </div>

    <div class="selector-group">
      <div class="group-label">
        <span class="group-num">04</span>
        <span class="group-title">OBJETIVO</span>
      </div>
      <div class="pills" data-group="objetivo">
        <button class="pill" data-value="viralizar">Viralizar</button>
        <button class="pill" data-value="captacion">Captar clientes</button>
        <button class="pill" data-value="marca">Imagen de marca</button>
        <button class="pill" data-value="engagement">Engagement</button>
      </div>
    </div>

  </section>

  <!-- CONTEXT FIELD -->
  <div class="context-wrap">
    <span class="context-label">Contexto adicional (opcional)</span>
    <input type="text" class="context-input" id="contexto"
      placeholder="Ej: Feria de Sevilla, traje flamenca, cliente premium…">
  </div>

  <!-- GENERATE -->
  <div class="generate-wrap">
    <button class="btn-generate" id="btn-generar">GENERAR IDEAS</button>
  </div>

  <!-- RESULTS -->
  <section id="resultados">
    <div class="divider"></div>

    <div class="resultados-header">
      <h2>IDEAS PARA TU CLIENTE</h2>
      <div class="header-actions">
        <button class="btn-regen" id="btn-regen">↺ OTRAS IDEAS</button>
        <button class="btn-whatsapp" id="btn-wa">✉ PROPUESTA</button>
      </div>
    </div>

    <div class="ideas-grid" id="ideas-grid"></div>

    <!-- WhatsApp panel -->
    <div class="wa-panel" id="wa-panel">
      <label>PROPUESTA LISTA PARA ENVIAR (WhatsApp / DM)</label>
      <textarea class="wa-text" id="wa-text" readonly></textarea>
      <div class="wa-actions">
        <button class="btn-copy-wa" id="btn-copy-wa">COPIAR MENSAJE</button>
        <button class="btn-close-wa" id="btn-close-wa">CERRAR</button>
      </div>
    </div>
  </section>

</div>

/* ── IDEAS BANK ── */
const IDEAS = [
  {
    id: 1,
    titulo: "La transformación silenciosa",
    formato: "12–15 seg · Sin voz · Beat drop en el corte",
    que_grabar: [

  },
  {

    hook: "Zoom en la costura más pequeña del traje. Nadie graba esto. Tú sí.",

  {

/* ── STATE ── */
const state = { cliente: null, trabajo: null, plataforma: null, objetivo: null };
let shownIds = new Set();

/* ── PILLS ── */
document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    const group = pill.closest('[data-group]').dataset.group;
    const val   = pill.dataset.value;
    pill.closest('[data-group]').querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    if (state[group] === val) {
      state[group] = null;
    } else {
      pill.classList.add('active');
      state[group] = val;
    }
  });
});

/* ── SCORING ── */
function score(idea) {
  let s = 0;
  if (state.cliente   && idea.clientes.includes(state.cliente))     s += 4;
  if (state.trabajo   && idea.trabajos.includes(state.trabajo))     s += 2;
  if (state.plataforma && idea.plataformas.includes(state.plataforma)) s += 3;
  if (state.objetivo  && idea.objetivos.includes(state.objetivo))   s += 3;
  s += (idea.boost / 10) * 1.5;
  return s;
}

function getIdeas(n = 4) {
  const scored = IDEAS
    .map(i => ({ ...i, _score: score(i) + (Math.random() * 0.8) }))
    .sort((a, b) => b._score - a._score);

  const available = scored.filter(i => !shownIds.has(i.id));
  const pool = available.length >= n ? available : scored;
  if (available.length < n) shownIds.clear();

  const picked = pool.slice(0, n);
  picked.forEach(i => shownIds.add(i.id));
  return picked;
}

/* ── RENDER ── */
function cardHTML(idea, idx) {
  return `
    <div class="idea-card">
      <div class="card-top">
        <span class="idea-num">IDEA ${String(idx + 1).padStart(2,'0')}</span>
      </div>
      <div class="idea-titulo">${idea.titulo}</div>
      <div class="idea-formato">${idea.formato}</div>

      <div class="row">
        <div class="row-label">Qué grabar</div>
        <ul class="grabar-list">
          ${idea.que_grabar.map(q => `<li>${q}</li>`).join('')}
        </ul>
      </div>
      <div class="row">
        <div class="row-label">Los primeros 3 segundos</div>
        <div class="idea-hook">${idea.hook}</div>
      </div>
      <div class="row">
        <div class="row-label">Por qué funciona</div>
        <div class="idea-porque">${idea.porque}</div>
      </div>

      <div class="card-footer">
        <button class="btn-copy" data-id="${idea.id}">COPIAR IDEA</button>
      </div>
    </div>`;
}

let currentIdeas = [];

function bindCopyButtons() {
  document.querySelectorAll('.btn-copy').forEach(btn => {
    btn.addEventListener('click', () => {
      const idea = IDEAS.find(i => i.id === parseInt(btn.dataset.id));
      const txt = `"${idea.titulo}"\n\nFormato: ${idea.formato}\n\nQué grabar:\n${idea.que_grabar.map(q=>`- ${q}`).join('\n')}\n\nHook (primeros 3s):\n${idea.hook}\n\nPor qué funciona:\n${idea.porque}`;
      navigator.clipboard.writeText(txt).then(() => {
        btn.textContent = '✓ COPIADO';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'COPIAR IDEA'; btn.classList.remove('copied'); }, 2000);
      });
    });
  });
}

function showResults(ideas) {
  currentIdeas = ideas;
  const grid  = document.getElementById('ideas-grid');
  const panel = document.getElementById('resultados');
  grid.innerHTML = ideas.map((idea, i) => cardHTML(idea, i)).join('');
  panel.style.display = 'block';
  bindCopyButtons();
  document.getElementById('wa-panel').classList.remove('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── GENERATE ── */
document.getElementById('btn-generar').addEventListener('click', () => {
  shownIds.clear();
  showResults(getIdeas(4));
});

document.getElementById('btn-regen').addEventListener('click', () => {
  const grid = document.getElementById('ideas-grid');
  grid.innerHTML = '';
  setTimeout(() => showResults(getIdeas(4)), 80);
});

document.getElementById('btn-wa').addEventListener('click', () => {
  const ctx     = document.getElementById('contexto').value.trim();
  const ctxLine = ctx ? `\nContexto: ${ctx}\n` : '';
  const cliente = state.cliente ? state.cliente.replace('_',' ') : 'tu negocio';

  let msg = `Hola, te comparto algunas ideas de contenido que he pensado para ${cliente}:${ctxLine}\n`;
  currentIdeas.forEach((idea, i) => {
    msg += `${i+1}. *${idea.titulo}*\n`;
    msg += `   Formato: ${idea.formato}\n`;
    msg += `   Apertura: ${idea.hook}\n\n`;
  });
  msg += `¿Alguna te encaja? Puedo preparte un presupuesto esta semana.\n\n— Pepe Metro`;

  document.getElementById('wa-text').value = msg;
  const panel = document.getElementById('wa-panel');
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
});

document.getElementById('btn-copy-wa').addEventListener('click', () => {
  const txt = document.getElementById('wa-text').value;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('btn-copy-wa');
    btn.textContent = '✓ COPIADO';
    setTimeout(() => btn.textContent = 'COPIAR MENSAJE', 2000);
  });
});

document.getElementById('btn-close-wa').addEventListener('click', () => {
  document.getElementById('wa-panel').classList.remove('visible');
});
</script>
</body>
</html>
