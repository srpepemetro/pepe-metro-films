<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dashboard — Pepe Metro Films</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PMF">
  <meta name="theme-color" content="#080808">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080808; --white: #f0ede8; --grey: #6b6b6b;
      --dim: rgba(240,237,232,0.05); --dim2: rgba(240,237,232,0.03);
      --border: rgba(240,237,232,0.08); --border-h: rgba(240,237,232,0.2);
      --fd: 'Bebas Neue', sans-serif; --fb: 'DM Sans', sans-serif;
      --green: rgba(126,200,122,0.9); --green-bg: rgba(126,200,122,0.1);
      --red: #e05c5c; --red-bg: rgba(224,92,92,0.1);
      --amber: rgba(255,196,84,0.85); --amber-bg: rgba(255,196,84,0.08);
      --blue: rgba(100,160,220,0.85); --blue-bg: rgba(100,160,220,0.09);
      --gold: rgba(201,169,110,0.85);
    }

    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--white); font-family: var(--fb); font-weight: 300; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: .45;
    }

    .wrap { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 44px 40px 120px; padding-top: max(44px, env(safe-area-inset-top) + 20px); padding-bottom: max(120px, env(safe-area-inset-bottom) + 80px); }

    /* HEADER */
    .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 36px; gap: 20px; }
    .brand-name { font-family: var(--fd); font-size: 1.5rem; letter-spacing: .2em; color: var(--white); opacity: .85; line-height: 1; }
    .brand-sub { font-size: .55rem; letter-spacing: .32em; text-transform: uppercase; color: var(--grey); margin-top: 6px; }
    .header-right { display: flex; align-items: center; gap: 18px; }
    .date-now { font-size: .58rem; letter-spacing: .2em; text-transform: uppercase; color: rgba(240,237,232,.25); text-align: right; line-height: 1.8; }
    .btn-refresh { background: none; border: 1px solid var(--border); color: var(--grey); font-family: var(--fb); font-weight: 300; font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; padding: 9px 18px; cursor: pointer; transition: border-color .25s, color .25s, background .25s; white-space: nowrap; }
    .btn-refresh:hover { border-color: var(--border-h); color: var(--white); background: var(--dim); }

    .rule { border: none; border-top: 1px solid var(--border); margin-bottom: 32px; }

    /* TABS */
    .tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
    .tab { font-family: var(--fb); font-weight: 300; font-size: .58rem; letter-spacing: .28em; text-transform: uppercase; color: var(--grey); padding: 10px 22px 13px; cursor: pointer; border: none; border-bottom: 2px solid transparent; background: none; margin-bottom: -1px; transition: color .2s, border-color .2s; }
    .tab.active { color: var(--white); border-bottom-color: var(--white); }
    .tab:hover:not(.active) { color: rgba(240,237,232,.55); }

    /* CARDS GRID */
    .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 14px; }

    /* CARD BASE */
    .card { background: var(--dim); border: 1px solid var(--border); padding: 26px 22px 22px; position: relative; overflow: hidden; transition: border-color .3s, box-shadow .3s; }
    .card:hover { border-color: var(--border-h); box-shadow: 0 0 40px rgba(240,237,232,.03); }
    .card-label { font-size: .52rem; letter-spacing: .3em; text-transform: uppercase; color: var(--grey); margin-bottom: 14px; }
    .card-value { font-family: var(--fd); font-size: clamp(1.9rem, 3vw, 2.8rem); letter-spacing: .02em; line-height: 1; color: var(--white); }
    .card-sub { font-size: .6rem; color: rgba(240,237,232,.25); margin-top: 10px; letter-spacing: .08em; }

    .card.neto-pos { box-shadow: inset 0 1px 0 rgba(240,237,232,.06); }
    .card.neto-neg { background: var(--red-bg); border-color: rgba(224,92,92,.18); }
    .card.neto-neg .card-value { color: var(--red); }
    .card.card-iva .card-value { color: rgba(240,237,232,.55); }
    .card.card-pending .card-value { color: var(--amber); }

    /* SKELETON */
    @keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
    .skel { background: linear-gradient(90deg, var(--dim) 25%, rgba(240,237,232,.09) 50%, var(--dim) 75%); background-size: 200% 100%; animation: shimmer 1.6s ease infinite; border-radius: 2px; }
    .skel-val { height: 46px; width: 55%; margin-bottom: 12px; }
    .skel-sub { height: 10px; width: 38%; }
    .skel-lbl { height: 9px; width: 42%; margin-bottom: 16px; }

    /* SECTION */
    .section { margin-top: 56px; }
    .section-head { font-size: .52rem; letter-spacing: .32em; text-transform: uppercase; color: var(--grey); margin-bottom: 26px; display: flex; align-items: center; gap: 14px; }
    .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .section-head-actions { margin-left: auto; display: flex; gap: 10px; }

    /* BAR CHART */
    .chart-wrap { overflow-x: auto; padding-bottom: 4px; }
    .chart { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; align-items: end; min-height: 180px; }
    .chart-col { display: flex; flex-direction: column; align-items: center; }
    .bars { display: flex; gap: 4px; align-items: flex-end; width: 100%; justify-content: center; padding-bottom: 10px; }
    .bar { width: 20px; min-height: 3px; border-radius: 1px 1px 0 0; transition: opacity .2s; }
    .bar:hover { opacity: .72; }
    .bar-in { background: var(--white); }
    .bar-out { background: rgba(240,237,232,.2); }
    .col-label { font-family: var(--fd); font-size: .8rem; letter-spacing: .1em; color: var(--grey); border-top: 1px solid var(--border); width: 100%; text-align: center; padding-top: 10px; }
    .chart-col.is-current .col-label { color: var(--white); }
    .chart-col.is-current .bar-in { filter: drop-shadow(0 0 6px rgba(240,237,232,.25)); }
    .chart-legend { display: flex; gap: 22px; margin-top: 18px; }
    .leg { display: flex; align-items: center; gap: 8px; font-size: .58rem; letter-spacing: .14em; text-transform: uppercase; color: var(--grey); }
    .leg-dot { width: 10px; height: 10px; border-radius: 1px; flex-shrink: 0; }
    .leg-in { background: var(--white); }
    .leg-out { background: rgba(240,237,232,.22); }

    /* TABLE */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-family: var(--fb); font-weight: 400; font-size: .5rem; letter-spacing: .28em; text-transform: uppercase; color: var(--grey); text-align: left; padding: 0 14px 14px; border-bottom: 1px solid var(--border); }
    thead th.right { text-align: right; }
    tbody tr { border-bottom: 1px solid rgba(240,237,232,.035); transition: background .15s; }
    tbody tr:hover { background: rgba(240,237,232,.025); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 13px 14px; font-size: .8rem; color: rgba(240,237,232,.65); vertical-align: middle; }
    tbody td.right { text-align: right; color: var(--white); font-weight: 400; }
    tbody td.date { color: rgba(240,237,232,.3); font-size: .72rem; letter-spacing: .04em; }
    .badge { font-size: .48rem; letter-spacing: .2em; text-transform: uppercase; padding: 3px 9px; border-radius: 2px; white-space: nowrap; }
    .badge-in  { background: var(--green-bg); color: var(--green); }
    .badge-out { background: var(--red-bg);   color: var(--red);   }
    .estado { font-size: .68rem; letter-spacing: .06em; }
    .estado-cob { color: rgba(240,237,232,.28); }
    .estado-pen { color: var(--amber); }

    /* ── PERSONAL: CUENTAS ── */
    .cuentas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }

    .cuenta-card { background: var(--dim); border: 1px solid var(--border); padding: 22px 20px 18px; transition: border-color .3s; }
    .cuenta-card:hover { border-color: var(--border-h); }
    .cuenta-nombre { font-size: .52rem; letter-spacing: .3em; text-transform: uppercase; color: var(--grey); margin-bottom: 12px; }
    .cuenta-saldo { font-family: var(--fd); font-size: 2.2rem; letter-spacing: .02em; line-height: 1; color: var(--white); cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .cuenta-saldo:hover .edit-hint { opacity: 1; }
    .cuenta-nombre:hover .edit-hint { opacity: 1 !important; }
    .edit-hint { font-size: .5rem; letter-spacing: .2em; color: var(--grey); opacity: 0; transition: opacity .2s; font-family: var(--fb); }
    .cuenta-input { font-family: var(--fd); font-size: 2.2rem; letter-spacing: .02em; background: none; border: none; border-bottom: 1px solid rgba(240,237,232,.3); color: var(--white); width: 100%; outline: none; padding-bottom: 4px; }
    .cuenta-updated { font-size: .58rem; color: rgba(240,237,232,.2); margin-top: 10px; }

    .total-liquido-card { background: rgba(240,237,232,.03); border: 1px solid rgba(240,237,232,.06); padding: 22px 20px 18px; display: flex; flex-direction: column; justify-content: space-between; }
    .total-liquido-card .card-label { font-size: .52rem; letter-spacing: .3em; text-transform: uppercase; color: rgba(240,237,232,.35); margin-bottom: 12px; }
    .total-liquido-card .card-value { font-family: var(--fd); font-size: 2.2rem; letter-spacing: .02em; color: rgba(240,237,232,.5); }

    /* ── PERSONAL: INVERSIÓN ── */
    .invest-card { background: var(--dim); border: 1px solid var(--border); padding: 28px 26px 24px; transition: border-color .3s; }
    .invest-card:hover { border-color: var(--border-h); }

    .invest-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; gap: 20px; flex-wrap: wrap; }
    .invest-fund { }
    .invest-fund-name { font-family: var(--fd); font-size: 1.4rem; letter-spacing: .08em; color: var(--white); line-height: 1; }
    .invest-fund-isin { font-size: .55rem; letter-spacing: .22em; color: var(--grey); margin-top: 6px; }

    .invest-badge-pos { display: inline-block; font-family: var(--fd); font-size: 1.2rem; letter-spacing: .08em; color: var(--green); background: var(--green-bg); padding: 4px 14px; }
    .invest-badge-neg { display: inline-block; font-family: var(--fd); font-size: 1.2rem; letter-spacing: .08em; color: var(--red); background: var(--red-bg); padding: 4px 14px; }

    .invest-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .invest-metric { }
    .invest-metric-label { font-size: .5rem; letter-spacing: .28em; text-transform: uppercase; color: var(--grey); margin-bottom: 8px; }
    .invest-metric-value { font-family: var(--fd); font-size: 1.7rem; letter-spacing: .03em; color: var(--white); }
    .invest-metric-value.pos { color: var(--green); }
    .invest-metric-value.neg { color: var(--red); }

    .invest-bar-wrap { margin-top: 20px; }
    .invest-bar-track { height: 3px; background: rgba(240,237,232,.08); border-radius: 2px; overflow: hidden; }
    .invest-bar-fill { height: 100%; background: var(--green); transition: width .8s ease; }
    .invest-bar-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: .52rem; color: rgba(240,237,232,.25); letter-spacing: .06em; }

    .invest-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
    .invest-updated { font-size: .58rem; color: rgba(240,237,232,.2); }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--grey); font-family: var(--fb); font-weight: 300; font-size: .55rem; letter-spacing: .18em; text-transform: uppercase; padding: 7px 14px; cursor: pointer; transition: border-color .2s, color .2s; }
    .btn-ghost:hover { border-color: var(--border-h); color: var(--white); }

    .invest-edit-form { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .invest-edit-form.show { display: flex; }
    .invest-edit-field { display: flex; flex-direction: column; gap: 6px; }
    .invest-edit-field label { font-size: .5rem; letter-spacing: .22em; text-transform: uppercase; color: var(--grey); }
    .invest-edit-field input { background: rgba(240,237,232,.06); border: 1px solid var(--border); color: var(--white); font-family: var(--fb); font-weight: 300; font-size: .85rem; padding: 9px 14px; outline: none; width: 160px; transition: border-color .2s; }
    .invest-edit-field input:focus { border-color: rgba(240,237,232,.3); }
    .btn-save { background: var(--white); color: var(--black); border: none; font-family: var(--fb); font-weight: 400; font-size: .6rem; letter-spacing: .18em; text-transform: uppercase; padding: 9px 20px; cursor: pointer; transition: background .2s; }
    .btn-save:hover { background: rgba(240,237,232,.85); }

    /* ── PERSONAL: GASTOS FIJOS ── */
    .gastos-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); }
    .gasto-row { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid rgba(240,237,232,.04); gap: 12px; transition: background .15s; }
    .gasto-row:last-child { border-bottom: none; }
    .gasto-row:hover { background: rgba(240,237,232,.025); }
    .gasto-nombre { flex: 1; font-size: .82rem; color: rgba(240,237,232,.7); }
    .gasto-importe { font-family: var(--fd); font-size: 1.1rem; letter-spacing: .04em; color: var(--white); min-width: 80px; text-align: right; }
    .gasto-delete { background: none; border: none; color: rgba(240,237,232,.2); cursor: pointer; font-size: .75rem; padding: 4px 8px; transition: color .2s; line-height: 1; }
    .gasto-delete:hover { color: var(--red); }

    .gasto-total-row { display: flex; align-items: center; padding: 14px 18px; background: rgba(240,237,232,.03); border-top: 1px solid var(--border); }
    .gasto-total-label { flex: 1; font-size: .52rem; letter-spacing: .28em; text-transform: uppercase; color: var(--grey); }
    .gasto-total-value { font-family: var(--fd); font-size: 1.3rem; letter-spacing: .04em; color: var(--amber); }

    .add-gasto-form { display: none; margin-top: 14px; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
    .add-gasto-form.show { display: flex; }
    .add-gasto-form input { background: rgba(240,237,232,.06); border: 1px solid var(--border); color: var(--white); font-family: var(--fb); font-weight: 300; font-size: .82rem; padding: 9px 14px; outline: none; transition: border-color .2s; }
    .add-gasto-form input:focus { border-color: rgba(240,237,232,.3); }
    .add-gasto-form input[name="nombre"] { width: 200px; }
    .add-gasto-form input[name="importe"] { width: 110px; }

    .btn-add { background: none; border: 1px dashed rgba(240,237,232,.18); color: rgba(240,237,232,.35); font-family: var(--fb); font-weight: 300; font-size: .55rem; letter-spacing: .2em; text-transform: uppercase; padding: 8px 16px; cursor: pointer; transition: border-color .2s, color .2s; margin-top: 14px; }
    .btn-add:hover { border-color: var(--border-h); color: var(--white); }

    /* ── PIPELINE ── */
    .pipeline-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
    .pipeline-card { background: var(--dim); border: 1px solid var(--border); padding: 20px 18px 24px; position: relative; overflow: hidden; transition: border-color .3s; }
    .pipeline-card:hover { border-color: var(--border-h); }
    .pipeline-status { display: inline-block; font-size: .46rem; letter-spacing: .2em; text-transform: uppercase; padding: 3px 9px; border-radius: 2px; margin-bottom: 12px; }
    .ps-presupuestado { background: rgba(240,237,232,.06); color: rgba(240,237,232,.3); }
    .ps-confirmado    { background: var(--blue-bg);  color: var(--blue);  }
    .ps-rodaje        { background: var(--amber-bg); color: var(--amber); }
    .ps-edicion       { background: rgba(150,100,220,.1); color: rgba(180,140,255,.85); }
    .ps-entregado     { background: var(--green-bg); color: var(--green); }
    .pipeline-name { font-family: var(--fd); font-size: 1.35rem; letter-spacing: .04em; line-height: 1.05; margin-bottom: 5px; }
    .pipeline-tipo { font-size: .56rem; letter-spacing: .16em; text-transform: uppercase; color: var(--grey); margin-bottom: 14px; }
    .pipeline-dates { display: flex; flex-direction: column; gap: 5px; }
    .pipeline-date { display: flex; gap: 10px; align-items: baseline; }
    .pipeline-date-lbl { font-size: .54rem; letter-spacing: .1em; color: rgba(240,237,232,.26); min-width: 64px; }
    .pipeline-date-val { font-size: .7rem; color: rgba(240,237,232,.62); }
    .pipeline-portal { display: inline-block; margin-top: 13px; font-size: .54rem; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); text-decoration: none; opacity: .55; transition: opacity .2s; }
    .pipeline-portal:hover { opacity: 1; }
    .pipeline-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(240,237,232,.05); }
    .pipeline-bar-fill { height: 100%; }
    .pf-presupuestado { background: rgba(240,237,232,.2);  width: 8%;  }
    .pf-confirmado    { background: var(--blue);           width: 28%; }
    .pf-rodaje        { background: var(--amber);          width: 58%; }
    .pf-edicion       { background: rgba(180,140,255,.85); width: 82%; }
    .pf-entregado     { background: var(--green);          width: 100%;}
    .pipeline-empty   { font-size: .78rem; color: var(--grey); padding: 14px 0; }
    .skel-pipeline    { height: 148px; }

    /* FADE UP */
    .fu { opacity: 0; transform: translateY(16px); animation: fu .65s ease forwards; }
    @keyframes fu { to { opacity: 1; transform: none; } }
    .d1{animation-delay:.05s} .d2{animation-delay:.12s} .d3{animation-delay:.19s}
    .d4{animation-delay:.26s} .d5{animation-delay:.33s} .d6{animation-delay:.4s}
    .d7{animation-delay:.47s} .d8{animation-delay:.54s} .d9{animation-delay:.6s} .d10{animation-delay:.66s}

    /* RESPONSIVE */
    @media (max-width: 720px) {
      .wrap { padding: 28px 20px 80px; }
      .cards-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .cards-grid .card:last-child { grid-column: 1 / -1; }
      .bar { width: 14px; }
      .invest-metrics { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .cards-grid { grid-template-columns: 1fr; }
      .cards-grid .card:last-child { grid-column: auto; }
      .header { flex-direction: column; gap: 14px; }
      .header-right { align-self: flex-end; }
      .invest-metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header class="header fu d1">
    <div>
      <div class="brand-name">PEPE METRO FILMS</div>
      <div class="brand-sub">Dashboard financiero</div>
    </div>
    <div class="header-right">
      <div class="date-now" id="dateNow"></div>
      <button class="btn-refresh" id="btnRefresh">⟳ Actualizar</button>
    </div>
  </header>

  <hr class="rule fu d2">

  <!-- ══ PIPELINE PROYECTOS ══ -->
  <div class="section fu d2" style="margin-top:24px;">
    <div class="section-head">Proyectos activos</div>
    <div class="pipeline-grid" id="pipelineGrid">
      <div class="skel skel-pipeline"></div>
      <div class="skel skel-pipeline"></div>
      <div class="skel skel-pipeline"></div>
    </div>
  </div>

  <!-- ══ NEGOCIO ══ -->
  <div class="tabs fu d2">
    <button class="tab active" data-tab="mes">Este mes</button>
    <button class="tab" data-tab="año">Este año</button>
  </div>
  <div class="cards-grid fu d3" id="topCards"></div>
  <div class="cards-grid fu d4" id="secondCards"></div>

  <div class="section fu d5">
    <div class="section-head">Ingresos vs gastos — últimos 6 meses</div>
    <div class="chart-wrap"><div class="chart" id="chart"></div></div>
    <div class="chart-legend">
      <div class="leg"><div class="leg-dot leg-in"></div>Ingresos</div>
      <div class="leg"><div class="leg-dot leg-out"></div>Gastos</div>
    </div>
  </div>

  <div class="section fu d7">
    <div class="section-head">Últimas transacciones</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Fecha</th><th>Descripción</th><th>Tipo</th><th>Estado</th><th class="right">Importe</th>
        </tr></thead>
        <tbody id="txBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ══ TRANSACCIONES PERSONALES ══ -->
  <div class="section fu d8">
    <div class="section-head">Finanzas personales — Notion</div>
    <div id="personalTxSection"><p style="font-size:.78rem;color:var(--grey);padding:20px 0;">Cargando...</p></div>
  </div>

  <!-- ══ CUENTAS PERSONALES ══ -->

const now   = new Date();
const thisM = now.getMonth();
const thisY = now.getFullYear();
const thisQ = Math.floor(thisM / 3);

/* ══════════════ FORMATTERS ══════════════ */
const eur  = n => new Intl.NumberFormat('es-ES', { style:'currency', currency:'EUR', minimumFractionDigits:0, maximumFractionDigits:0 }).format(n);
const eurD = n => new Intl.NumberFormat('es-ES', { style:'currency', currency:'EUR', minimumFractionDigits:2, maximumFractionDigits:2 }).format(n);
const sum  = (arr, key) => arr.reduce((a,t) => a + (t[key]||0), 0);

function parseMY(s) { const d = new Date(s); return { m: d.getMonth(), y: d.getFullYear() }; }

function relativeDate(dateStr) {
  const days = Math.round((now - new Date(dateStr)) / 86400000);
  if (days === 0) return 'hoy';
  if (days === 1) return 'ayer';
  return `hace ${days} días`;
}

/* ══════════════ BUSINESS METRICS ══════════════ */
function metrics(tx) {
  const fMes  = t => { const {m,y}=parseMY(t.fecha); return m===thisM && y===thisY; };
  const fYear = t => parseMY(t.fecha).y === thisY;
  const fQ    = t => { const {m,y}=parseMY(t.fecha); return Math.floor(m/3)===thisQ && y===thisY; };

  const inMes   = tx.filter(t => t.tipo==='Ingreso' && fMes(t));
  const outMes  = tx.filter(t => t.tipo==='Gasto'   && fMes(t));
  const inYear  = tx.filter(t => t.tipo==='Ingreso' && fYear(t));
  const outYear = tx.filter(t => t.tipo==='Gasto'   && fYear(t));
  const inQ     = tx.filter(t => t.tipo==='Ingreso' && fQ(t));
  const pend    = tx.filter(t => t.tipo==='Ingreso' && t.estado==='Pendiente');

  return {
    ingresosMes:  sum(inMes,'importe_neto'),  gastosMes:    sum(outMes,'importe_neto'),
    netoMes:      sum(inMes,'importe_neto') - sum(outMes,'importe_neto'),
    ingresosYear: sum(inYear,'importe_neto'), gastosYear:   sum(outYear,'importe_neto'),
    netoYear:     sum(inYear,'importe_neto') - sum(outYear,'importe_neto'),
    ingresosQ:    sum(inQ,'importe_neto'),    ivaQ:         sum(inQ,'iva_eur'),
    pendientes:   sum(pend,'importe_neto'),
  };
}

function monthly(tx) {
  return Array.from({length:6}, (_,i) => {
    const d = new Date(thisY, thisM-(5-i), 1);
    const m = d.getMonth(), y = d.getFullYear();
    const txI = tx.filter(t => { const {m:tm,y:ty}=parseMY(t.fecha); return tm===m && ty===y && t.tipo==='Ingreso'; });
    const txO = tx.filter(t => { const {m:tm,y:ty}=parseMY(t.fecha); return tm===m && ty===y && t.tipo==='Gasto';   });
    return { label: d.toLocaleString('es-ES',{month:'short'}).toUpperCase().replace('.',''), ingreso: sum(txI,'importe_neto'), gasto: sum(txO,'importe_neto'), current: i===5 };
  });
}

/* ══════════════ SPLIT BY ÁMBITO ══════════════ */
function splitTx(tx) {
  return {
    negocio:  tx.filter(t => t.ambito !== 'Personal'),
    personal: tx.filter(t => t.ambito === 'Personal'),
  };
}

/* ══════════════ RENDER PERSONAL TRANSACTIONS ══════════════ */

        <div class="card-sub">este mes</div>

        <div class="card-label">Balance personal</div>
        <div class="card-value">${eur(totalIngresos-totalGastos)}</div>
        <div class="card-sub">este mes</div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Fecha</th><th>Descripción</th><th>Tipo</th><th>Estado</th><th class="right">Importe</th></tr></thead>
        <tbody>${recientes.map(t => {
          const ds = new Date(t.fecha).toLocaleDateString('es-ES',{day:'2-digit',month:'short'}).replace('.','');
          const badge = t.tipo==='Ingreso' ? `<span class="badge badge-in">Ingreso</span>` : `<span class="badge badge-out">Gasto</span>`;
          const est   = t.estado==='Cobrado' ? 'estado-cob' : 'estado-pen';
          return `<tr><td class="date">${ds}</td><td>${t.descripcion}</td><td>${badge}</td><td><span class="estado ${est}">${t.estado}</span></td><td class="right">${eurD(t.importe_neto)}</td></tr>`;
        }).join('')}</tbody>

}

function renderCards(m) {

  document.getElementById('topCards').innerHTML = `

function renderChart(tx) {
  const cols = monthly(tx);
  const max  = Math.max(...cols.map(c => Math.max(c.ingreso,c.gasto)), 1);
  document.getElementById('chart').innerHTML = cols.map(c => {

    return `<div class="chart-col ${c.current?'is-current':''}"><div class="bars"><div class="bar bar-in" style="height:${hI}px" title="${eur(c.ingreso)}"></div><div class="bar bar-out" style="height:${hG}px" title="${eur(c.gasto)}"></div></div><div class="col-label">${c.label}</div></div>`;

/* ══════════════ RENDER PIPELINE ══════════════ */
function fmtPDate(iso) {
  if (!iso) return '—';
  if (!iso.includes('T')) {
    const [y,m,d] = iso.split('-').map(Number);
    const mn = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    return `${d} ${mn[m-1]} ${y}`;
  }
  const dt = new Date(iso);
  const mn = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const h = String(dt.getHours()).padStart(2,'0'), mi = String(dt.getMinutes()).padStart(2,'0');
  return `${dt.getDate()} ${mn[dt.getMonth()]} ${dt.getFullYear()}, ${h}:${mi}h`;
}

function renderPipeline(projects) {
  const ACTIVE = ['Presupuestado','Confirmado','En rodaje','En edición'];
  const active = (projects || []).filter(p => ACTIVE.includes(p.estado));
  const grid = document.getElementById('pipelineGrid');
  if (!active.length) {
    grid.innerHTML = '<p class="pipeline-empty">Sin proyectos activos en este momento.</p>';
    return;
  }
  const sc = s => ({ 'Presupuestado':'presupuestado','Confirmado':'confirmado','En rodaje':'rodaje','En edición':'edicion','Entregado':'entregado' }[s] || 'confirmado');
  grid.innerHTML = active.map(p => `
    <div class="pipeline-card">
      <span class="pipeline-status ps-${sc(p.estado)}">${p.estado}</span>
      <div class="pipeline-name">${p.proyecto}</div>
      <div class="pipeline-tipo">${p.tipo || '—'}</div>
      <div class="pipeline-dates">
        <div class="pipeline-date"><span class="pipeline-date-lbl">Rodaje</span><span class="pipeline-date-val">${fmtPDate(p.fecha_rodaje)}</span></div>
        <div class="pipeline-date"><span class="pipeline-date-lbl">Entrega</span><span class="pipeline-date-val">${fmtPDate(p.fecha_entrega)}</span></div>
        ${p.presupuesto ? `<div class="pipeline-date"><span class="pipeline-date-lbl">Presupuesto</span><span class="pipeline-date-val">${eur(p.presupuesto)}</span></div>` : ''}
      </div>
      <a class="pipeline-portal" href="/cliente?id=${p.id}" target="_blank">Portal cliente →</a>
      <div class="pipeline-bar"><div class="pipeline-bar-fill pf-${sc(p.estado)}"></div></div>
    </div>`).join('');
}

          <button onclick="deleteCuenta(${c.id})" style="background:none;border:none;color:rgba(240,237,232,.2);cursor:pointer;font-size:.7rem;padding:2px 4px;transition:color .2s;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='rgba(240,237,232,.2)'">✕</button>
        </div>
      </div>`).join('') +
    `<div class="total-liquido-card">
      <div class="card-label">Total líquido</div>
      <div class="card-value">${eurD(total)}</div>
    </div>`;
}

function startEditNombre(id, el) {
  const c = personal.cuentas.find(x => x.id === id);
  if (!c) return;
  const prev = c.nombre;
  el.innerHTML = `<input class="cuenta-input" type="text" value="${prev}" autofocus style="font-family:var(--fb);font-size:.85rem;letter-spacing:.05em;">`;
  const inp = el.querySelector('input');
  inp.select();
  const commit = () => {
    const val = inp.value.trim();
    if (val) { c.nombre = val; savePersonal(personal); }
    renderCuentas();
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => { if (e.key==='Enter') inp.blur(); if (e.key==='Escape') renderCuentas(); });
}

function deleteCuenta(id) {
  personal.cuentas = personal.cuentas.filter(c => c.id !== id);
  savePersonal(personal);
  renderCuentas();
}

function startEditCuenta(id, el) {
  const c = personal.cuentas.find(x => x.id === id);
  if (!c) return;
  el.innerHTML = `<input class="cuenta-input" type="number" step="0.01" value="${c.saldo}" autofocus>`;
  const inp = el.querySelector('input');
  inp.select();
  const commit = () => {
    const val = parseFloat(inp.value);
    if (!isNaN(val)) {
      c.saldo   = val;
      c.updated = new Date().toISOString().slice(0,10);
      savePersonal(personal);
    }
    renderCuentas();
  };
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => { if (e.key==='Enter') inp.blur(); if (e.key==='Escape') renderCuentas(); });
}

/* ══════════════ RENDER INVERSIÓN ══════════════ */
function renderInversion() {
  const inv = personal.inversion;
  const ganancia = inv.valorActual - inv.invertido;
  const pct = ((ganancia / inv.invertido) * 100).toFixed(2);
  const pos = ganancia >= 0;
  const fillPct = Math.min(100, Math.max(0, (inv.valorActual / (inv.invertido * 1.5)) * 100));

  document.getElementById('investCard').innerHTML = `
    <div class="invest-top">
      <div class="invest-fund">
        <div class="invest-fund-name">${inv.fondo}</div>
        <div class="invest-fund-isin">${inv.isin}</div>
      </div>
      <div class="${pos ? 'invest-badge-pos' : 'invest-badge-neg'}">${pos?'+':''}${pct}%</div>
    </div>

    <div class="invest-metrics">
      <div class="invest-metric">
        <div class="invest-metric-label">Capital invertido</div>
        <div class="invest-metric-value">${eurD(inv.invertido)}</div>
      </div>
      <div class="invest-metric">
        <div class="invest-metric-label">Valor actual</div>
        <div class="invest-metric-value">${eurD(inv.valorActual)}</div>
      </div>
      <div class="invest-metric">
        <div class="invest-metric-label">Ganancia</div>
        <div class="invest-metric-value ${pos?'pos':'neg'}">${pos?'+':''}${eurD(ganancia)}</div>
      </div>
    </div>

    <div class="invest-bar-wrap">
      <div class="invest-bar-track">
        <div class="invest-bar-fill" style="width:${fillPct}%"></div>
      </div>
      <div class="invest-bar-labels">
        <span>Invertido ${eurD(inv.invertido)}</span>
        <span>Mercado ${eurD(inv.valorActual)}</span>
      </div>
    </div>

    <div class="invest-footer">
      <div class="invest-updated">Actualizado ${relativeDate(inv.updated)}</div>
      <button class="btn-ghost" onclick="toggleInvestForm()">Actualizar valor</button>
    </div>

    <div class="invest-edit-form" id="investEditForm">
      <div class="invest-edit-field">
        <label>Capital invertido (€)</label>
        <input id="invInvertido" type="number" step="0.01" value="${inv.invertido}">
      </div>
      <div class="invest-edit-field">
        <label>Valor actual (€)</label>
        <input id="invValor" type="number" step="0.01" value="${inv.valorActual}">
      </div>
      <button class="btn-save" onclick="saveInversion()">Guardar</button>
    </div>`;
}

function toggleInvestForm() {
  const f = document.getElementById('investEditForm');
  f.classList.toggle('show');
}

function saveInversion() {
  const inv = parseFloat(document.getElementById('invInvertido').value);
  const val = parseFloat(document.getElementById('invValor').value);
  if (!isNaN(inv) && !isNaN(val)) {
    personal.inversion.invertido   = inv;
    personal.inversion.valorActual = val;
    personal.inversion.updated     = new Date().toISOString().slice(0,10);
    savePersonal(personal);
    renderInversion();
  }
}

/* ══════════════ RENDER GASTOS FIJOS ══════════════ */
function renderGastosFijos() {
  const { gastosFijos } = personal;
  const total = gastosFijos.reduce((a,g) => a + g.importe, 0);

  const rows = gastosFijos.map(g => `
    <div class="gasto-row">
      <div class="gasto-nombre">${g.nombre}</div>
      <div class="gasto-importe">${eurD(g.importe)}</div>
      <button class="gasto-delete" onclick="deleteGasto(${g.id})" title="Eliminar">✕</button>
    </div>`).join('');

  document.getElementById('gastosListWrap').innerHTML = `
    <div class="gastos-list">
      ${rows || '<div class="gasto-row"><div class="gasto-nombre" style="color:var(--grey)">Sin gastos fijos registrados</div></div>'}
      <div class="gasto-total-row">
        <div class="gasto-total-label">Total mensual</div>
        <div class="gasto-total-value">${eurD(total)}</div>
      </div>
    </div>`;
}

function deleteGasto(id) {
  personal.gastosFijos = personal.gastosFijos.filter(g => g.id !== id);
  savePersonal(personal);
  renderGastosFijos();
}

/* ══════════════ EVENTS: ADD CUENTA ══════════════ */
document.getElementById('btnAddCuenta').addEventListener('click', () => {
  document.getElementById('addCuentaForm').classList.toggle('show');
});
document.getElementById('cancelCuentaBtn').addEventListener('click', () => {
  document.getElementById('addCuentaForm').classList.remove('show');
});
document.getElementById('saveCuentaBtn').addEventListener('click', () => {
  const form   = document.getElementById('addCuentaForm');
  const nombre = form.querySelector('[name="nombre"]').value.trim();
  const saldo  = parseFloat(form.querySelector('[name="saldo"]').value);
  if (!nombre || isNaN(saldo)) return;
  personal.cuentas.push({ id: Date.now(), nombre, saldo, updated: new Date().toISOString().slice(0,10) });
  savePersonal(personal);
  form.classList.remove('show');
  form.querySelector('[name="nombre"]').value = '';
  form.querySelector('[name="saldo"]').value  = '';
  renderCuentas();
});

/* ══════════════ EVENTS: ADD GASTO ══════════════ */
document.getElementById('btnAddGasto').addEventListener('click', () => {
  document.getElementById('addGastoForm').classList.toggle('show');
});
document.getElementById('cancelGastoBtn').addEventListener('click', () => {
  document.getElementById('addGastoForm').classList.remove('show');
});
document.getElementById('saveGastoBtn').addEventListener('click', () => {
  const form    = document.getElementById('addGastoForm');
  const nombre  = form.querySelector('[name="nombre"]').value.trim();
  const importe = parseFloat(form.querySelector('[name="importe"]').value);
  if (!nombre || isNaN(importe)) return;
  personal.gastosFijos.push({ id: Date.now(), nombre, importe });
  savePersonal(personal);
  form.classList.remove('show');
  form.querySelector('[name="nombre"]').value  = '';
  form.querySelector('[name="importe"]').value = '';
  renderGastosFijos();
});

/* ══════════════ TABS ══════════════ */
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentTab = t.dataset.tab;
    if (txData) renderBusiness(splitTx(txData).negocio);
  });
});

/* ══════════════ LOAD BUSINESS DATA ══════════════ */
async function loadData() {
  document.getElementById('topCards').innerHTML    = skeletonGrid();
  document.getElementById('secondCards').innerHTML = skeletonGrid();
  document.getElementById('pipelineGrid').innerHTML =
    `<div class="skel skel-pipeline"></div><div class="skel skel-pipeline"></div><div class="skel skel-pipeline"></div>`;
  document.getElementById('btnRefresh').textContent = '⟳';

  try {
    const res = await fetch('/api/notion-data', { signal: AbortSignal.timeout(15000) });
    if (!res.ok) throw new Error();
    const json = await res.json();
    txData = json.transactions; isMock = false;
    renderPipeline(json.projects || []);
  } catch (_) {
    txData = MOCK_TX; isMock = true;
    renderPipeline([]);
  }

  renderAll(txData);
  document.getElementById('btnRefresh').textContent = isMock ? '⟳ Demo' : '⟳ Actualizar';
}

document.getElementById('btnRefresh').addEventListener('click', loadData);

/* ══════════════ DATE HEADER ══════════════ */
document.getElementById('dateNow').textContent =
  now.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

/* ══════════════ INIT ══════════════ */
loadData();
renderCuentas();
renderInversion();
renderGastosFijos();
</script>
</body>
</html>
